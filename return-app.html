<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>回首 Return・後台</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Noto+Serif+TC:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --clay:#A67C5B;--clay-d:#8B6245;--clay-l:#C4A882;--clay-xl:#F2EAE0;--clay-xx:#FAF6F1;
  --ink:#2A1F14;--ink2:#6B5A4A;--ink3:#A89880;--cream:#FDF8F3;--gold:#C9A96E;
  --bd:rgba(166,124,91,.18);--bd2:rgba(166,124,91,.32);
  --ok:#4A7C59;--ok-l:#E8F4EC;--ng:#A03030;--ng-l:#FDEAEA;
  --r:8px;--rl:14px;
  --serif:'Cormorant Garamond',Georgia,serif;
  --tc:'Noto Serif TC',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --nav:52px;--tab:58px;
}
html{font-size:15px}
body{font-family:var(--sans);background:var(--clay-xx);color:var(--ink);min-height:100vh;overflow-x:hidden}
button{cursor:pointer;font-family:var(--sans);font-size:13px;-webkit-appearance:none}
input,select,textarea{font-family:var(--sans);-webkit-appearance:none;border-radius:0}

/* NAV */
#topnav{position:fixed;top:0;left:0;right:0;z-index:100;height:var(--nav);background:rgba(253,248,243,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.tn-left{display:flex;align-items:center;gap:10px}
.tn-logo{width:32px;height:32px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tn-logo svg{width:18px;height:18px;fill:none;stroke:#FAF6F1;stroke-width:1.5;stroke-linecap:round}
.tn-name{font-family:var(--tc);font-size:14px;color:var(--ink);letter-spacing:.04em}
.tn-role{font-size:9px;color:var(--clay);letter-spacing:.1em;margin-top:1px}
.tn-right{display:flex;align-items:center;gap:8px}
.notif-btn{position:relative;background:none;border:none;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.notif-btn svg{width:20px;height:20px;stroke:var(--ink2);fill:none;stroke-width:1.6}
.notif-badge{position:absolute;top:4px;right:4px;width:16px;height:16px;border-radius:50%;background:var(--ng);color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600;display:none}
.qadd-btn{background:var(--clay);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:20px;display:flex;align-items:center;justify-content:center;line-height:1}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--clay-xl);border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;font-family:var(--tc);font-size:13px;color:var(--clay-d);cursor:pointer}

/* TABBAR */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;height:var(--tab);background:rgba(253,248,243,.97);backdrop-filter:blur(14px);border-top:1px solid var(--bd);display:flex;padding-bottom:env(safe-area-inset-bottom,0)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;color:var(--ink3);font-size:9px;letter-spacing:.05em;padding:0;cursor:pointer;transition:color .15s}
.tab svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.6}
.tab.on{color:var(--clay)}

/* MAIN */
#main{padding:calc(var(--nav)+14px) 14px calc(var(--tab)+14px);min-height:100vh}
.page{display:none}
.page.on{display:block}
.pg-title{font-family:var(--tc);font-size:20px;color:var(--ink);margin-bottom:3px}
.pg-sub{font-size:12px;color:var(--ink3);margin-bottom:16px;letter-spacing:.04em}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.scard{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:12px 14px}
.scard-lbl{font-size:10px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.scard-val{font-family:var(--serif);font-size:22px;font-weight:300;color:var(--ink);line-height:1}
.scard-hint{font-size:11px;color:var(--clay);margin-top:3px}
.scard-hint.ok{color:var(--ok)}
.scard-hint.ng{color:var(--ng)}
.card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;margin-bottom:12px}
.card-hdr{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--clay-xx)}
.card-t{font-size:13px;font-weight:500;color:var(--ink);letter-spacing:.04em}
.empty-msg{padding:18px 14px;font-size:13px;color:var(--ink3);text-align:center}

/* BK LIST */
.bk-item{padding:12px 14px;border-bottom:1px solid rgba(166,124,91,.08);display:flex;align-items:flex-start;gap:10px}
.bk-item:last-child{border-bottom:none}
.bk-time{font-size:12px;font-weight:600;color:var(--ink);min-width:44px;flex-shrink:0}
.bk-info{flex:1;min-width:0}
.bk-name{font-size:13px;color:var(--ink);font-weight:500}
.bk-meta{font-size:11px;color:var(--ink3);margin-top:2px}
.bk-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.bk-amt{font-family:var(--serif);font-size:15px;color:var(--clay-d)}
.bdg{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px}
.bdg-ok{background:var(--clay-xl);color:var(--clay-d)}
.bdg-pend{background:#F5E8D0;color:#8B6020}
.bdg-no{background:#f0edea;color:var(--ink3)}
.bdg-ok2{background:var(--ok-l);color:var(--ok)}
.bdg-ng{background:var(--ng-l);color:var(--ng)}
.btn-xs{padding:4px 10px;border-radius:var(--r);border:1px solid var(--bd2);background:none;color:var(--ink2);font-size:11px;white-space:nowrap;transition:all .15s}
.btn-xs:hover{border-color:var(--clay);color:var(--clay)}
.btn-xs.ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.btn-xs.clay{background:var(--clay);color:#fff;border-color:var(--clay)}
.btn-xs.ng{background:var(--ng-l);color:var(--ng);border-color:var(--ng)}

/* WEEK */
.week-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:12px}
.wd{background:#fff;border:1px solid var(--bd);border-radius:var(--r);padding:6px 3px;min-height:68px}
.wd.today{border-color:var(--clay)}
.wd-lbl{font-size:9px;color:var(--ink3);text-align:center}
.wd-date{font-family:var(--serif);font-size:14px;color:var(--ink);text-align:center;margin:1px 0 4px}
.wd-ev{background:var(--clay-xl);border-radius:2px;padding:2px 3px;font-size:8px;color:var(--clay-d);margin-bottom:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.wd-ev:hover{background:var(--clay-l);color:#fff}

/* TABLE */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.tbl{width:100%;border-collapse:collapse;min-width:460px}
.tbl th{text-align:left;font-size:10px;color:var(--ink3);padding:7px 10px;border-bottom:1px solid var(--bd);background:var(--clay-xx);font-weight:400;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.tbl td{padding:9px 10px;font-size:12px;color:var(--ink2);border-bottom:1px solid rgba(166,124,91,.08);white-space:nowrap}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--clay-xx)}

/* CLIENTS */
.search-wrap{position:relative;margin-bottom:12px}
.search-inp{width:100%;padding:12px 14px 12px 38px;border:1px solid var(--bd2);border-radius:var(--r);font-size:14px;color:var(--ink);background:#fff;outline:none;transition:border .15s}
.search-inp:focus{border-color:var(--clay)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.cl-card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.cl-hdr{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.cl-hdr:hover{background:var(--clay-xx)}
.cl-name{font-family:var(--tc);font-size:14px;color:var(--ink)}
.cl-meta{font-size:11px;color:var(--ink3);margin-top:1px}
.cl-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.cl-pkg-tag{font-size:10px;padding:2px 8px;border-radius:99px;background:var(--clay-xl);color:var(--clay-d);white-space:nowrap}
.cl-visits{font-family:var(--serif);font-size:18px;color:var(--clay-d);text-align:right}
.cl-visits-lbl{font-size:9px;color:var(--ink3)}
.cl-body{border-top:1px solid var(--bd);padding:14px;background:var(--clay-xx);display:none}
.cl-body.open{display:block}
.cl-field{margin-bottom:10px}
.cl-field label{display:block;font-size:10px;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.cl-field input,.cl-field textarea,.cl-field select{width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--ink);background:#fff;outline:none;transition:border .15s}
.cl-field textarea{height:58px;resize:vertical}
.cl-field input:focus,.cl-field textarea:focus{border-color:var(--clay)}
.pkg-vis{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.pkg-dot{width:20px;height:6px;border-radius:3px}
.src-tag{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:99px;margin-left:6px}
.src-online{background:var(--ok-l);color:var(--ok)}
.src-walkin{background:var(--clay-xl);color:var(--clay-d)}
.src-referral{background:#EEE8F4;color:#6B3FA0}

/* GENO PANEL */
.geno-ov{position:fixed;inset:0;z-index:200;display:flex;justify-content:flex-end;pointer-events:none}
.geno-bd{position:absolute;inset:0;background:rgba(42,31,20,.35);pointer-events:all;transition:opacity .25s;opacity:0}
.geno-bd.open{opacity:1}
.geno-panel{width:min(300px,90vw);background:#fff;border-left:1px solid var(--bd);height:100%;overflow-y:auto;pointer-events:all;transform:translateX(100%);transition:transform .25s ease;margin-top:var(--nav)}
.geno-panel.open{transform:translateX(0)}
.geno-hdr{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--clay-xx);position:sticky;top:0}
.geno-title{font-family:var(--tc);font-size:14px;color:var(--ink)}
.geno-close{background:none;border:none;font-size:20px;color:var(--ink3);padding:2px 6px}
.geno-body{padding:14px}
.geno-tier-lbl{font-size:10px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px}
.geno-person{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--clay-xx);border-radius:var(--r);margin-bottom:6px;border:1px solid var(--bd)}
.geno-person.main{background:var(--clay-xl);border-color:var(--clay-l)}
.geno-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--tc);font-size:13px;color:#fff;flex-shrink:0;background:var(--clay)}
.geno-av.ref{background:var(--ink2)}
.geno-av.sub{background:#7BAAB0}
.geno-pname{font-family:var(--tc);font-size:13px;color:var(--ink)}
.geno-pmeta{font-size:11px;color:var(--ink3);margin-top:1px}
.geno-conn{text-align:center;font-size:18px;color:var(--clay-l);margin:0 0 6px 16px}
.geno-total{background:var(--clay);border-radius:var(--r);padding:12px 14px;text-align:center;margin-top:10px}
.geno-total-lbl{font-size:10px;color:rgba(255,255,255,.6);letter-spacing:.1em;margin-bottom:4px}
.geno-total-val{font-family:var(--serif);font-size:24px;font-weight:300;color:#fff}

/* CHECKOUT */
.co-sec{margin-bottom:14px}
.co-sec-t{font-size:11px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between}
.co-item-row{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#fff;border:1px solid var(--bd);border-radius:var(--r);margin-bottom:6px}
.co-item-name{flex:1;font-size:13px;color:var(--ink)}
.co-item-sub{font-size:10px;color:var(--clay)}
.price-inp{width:72px;text-align:right;padding:6px 8px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;color:var(--ink);background:var(--clay-xx)}
.rm-btn{background:none;border:none;color:var(--ink3);font-size:18px;padding:2px 4px;line-height:1;flex-shrink:0}
.prod-add-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:10px}
.prod-add{border:1px solid var(--bd);border-radius:var(--r);padding:10px 6px;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
.prod-add:hover{border-color:var(--clay-l);background:var(--clay-xx)}
.prod-add-icon{font-size:18px;margin-bottom:4px}
.prod-add-name{font-size:11px;color:var(--ink)}
.prod-add-price{font-size:11px;color:var(--clay);margin-top:1px}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.pay-btn{border:1px solid var(--bd2);border-radius:var(--r);padding:11px 8px;text-align:center;cursor:pointer;background:#fff;transition:all .15s}
.pay-btn.sel{border-color:var(--clay);background:var(--clay-xl)}
.pay-icon{font-size:18px;margin-bottom:3px}
.pay-name{font-size:12px;color:var(--ink2)}
.pkg-toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--clay-xl);border:1px solid var(--clay-l);border-radius:var(--r);padding:12px 13px;margin-bottom:10px}
.toggle-sw{width:38px;height:22px;border-radius:11px;border:none;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.toggle-sw.on{background:var(--clay)}
.toggle-sw:not(.on){background:var(--clay-l)}
.toggle-sw::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-sw.on::after{left:19px}
.pkg-count-row{display:flex;align-items:center;gap:12px;background:var(--clay-xx);border:1px solid var(--bd);border-radius:var(--r);padding:10px 14px;margin-bottom:10px}
.pkg-count-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd2);background:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.pkg-count-btn:hover{border-color:var(--clay);color:var(--clay)}
.pkg-count-num{font-family:var(--serif);font-size:24px;font-weight:300;color:var(--clay-d);min-width:24px;text-align:center}
.pkg-count-info{flex:1;font-size:12px;color:var(--ink2)}
.inv-row{background:var(--clay-xx);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px;margin-bottom:10px}
.inv-toggle{display:flex;align-items:center;justify-content:space-between;font-size:13px;color:var(--ink2);cursor:pointer}
.inv-body{display:none;margin-top:10px}
.inv-body.open{display:block}
.sumbox{background:var(--clay-xx);border:1px solid var(--bd);border-radius:var(--r);padding:13px 14px;margin-bottom:10px}
.sr{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;align-items:baseline}
.sr.tot{border-top:1px solid var(--bd);margin-top:8px;padding-top:10px;font-weight:500;font-size:15px}
.sl{color:var(--ink3)}
.btn-main{width:100%;background:var(--clay);color:#fff;border:none;padding:14px;border-radius:var(--r);font-size:14px;letter-spacing:.06em;transition:background .15s}
.btn-main:hover:not(:disabled){background:var(--clay-d)}
.btn-main:disabled{opacity:.35;cursor:not-allowed}
.phone-suggest{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--bd2);border-radius:var(--r);z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.08);overflow:hidden;margin-top:2px}
.psi{padding:10px 13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(166,124,91,.06)}
.psi:last-child{border-bottom:none}
.psi:hover{background:var(--clay-xx)}
.psi-name{font-size:13px;color:var(--ink);font-weight:500}
.psi-phone{font-size:11px;color:var(--ink3)}
.psi-pkg{font-size:10px;color:var(--clay)}

/* STAFF */
.staff-cards{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.st-card{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:16px;position:relative;overflow:hidden}
.st-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.comm-box{background:var(--clay-xx);border:1px solid var(--bd);border-radius:var(--r);padding:11px 13px}
.comm-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.comm-row.tot{border-top:1px solid var(--bd);margin-top:6px;padding-top:8px;font-weight:500;font-size:14px;color:var(--clay-d)}
.sched-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.sched-inner{display:grid;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.sg-hdr{background:var(--clay-xx);padding:5px 4px;font-size:9px;color:var(--ink3);text-align:center;letter-spacing:.05em}
.sg-lbl{background:var(--clay-xx);padding:8px 8px;font-size:11px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.sg-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0}
.sg-cell{min-height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;flex-direction:column;gap:1px;padding:3px}
.sg-cell:hover{background:var(--clay-xx)}
.sg-cell.work{background:var(--clay-xl)}
.sg-cell.off{background:var(--ng-l)}
.sg-cell.today-col{border-left:2px solid var(--clay)}
.sg-dot{width:7px;height:7px;border-radius:50%}
.sg-dot.work{background:var(--clay)}
.sg-dot.off{background:var(--ng)}
.sg-lbl2{font-size:8px;color:var(--ink3)}
.pkg-rec-item{padding:11px 14px;border-bottom:1px solid rgba(166,124,91,.08);display:flex;align-items:center;gap:10px}
.pkg-rec-item:last-child{border-bottom:none}
.pkg-rec-name{font-size:13px;color:var(--ink);font-weight:500}
.pkg-rec-meta{font-size:11px;color:var(--ink3);margin-top:1px}
.pkg-rec-count{font-family:var(--serif);font-size:15px;color:var(--clay-d);margin-right:6px}

/* CHARTS */
.bars{display:flex;align-items:flex-end;gap:4px;height:100px;border-bottom:1px solid var(--bd);padding:0 1px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end}
.bfill{width:100%;background:var(--clay-l);border-radius:2px 2px 0 0;min-height:2px;cursor:pointer;position:relative;transition:background .15s}
.bfill:hover{background:var(--clay)}
.bfill.pkg{background:#9FC5C9}
.bfill.pkg:hover{background:#7BAAB0}
.btip{display:none;position:absolute;top:-18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:8px;padding:2px 5px;border-radius:3px;white-space:nowrap;pointer-events:none}
.bfill:hover .btip{display:block}
.blbl{font-size:8px;color:var(--ink3);text-align:center;margin-top:3px}

/* BOOKING FLOW */
.steps{display:flex;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.sp{padding:4px 12px;border-radius:99px;font-size:11px;letter-spacing:.05em;border:1px solid var(--bd)}
.sp.done{background:var(--clay-xl);border-color:var(--clay-l);color:var(--clay-d)}
.sp.active{background:var(--clay);border-color:var(--clay);color:#fff}
.sp.idle{color:var(--ink3)}
.fcard{background:#fff;border:1px solid var(--bd);border-radius:var(--rl);padding:18px 16px;margin-bottom:12px}
.fcard h3{font-family:var(--tc);font-size:16px;color:var(--ink);margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;color:var(--ink2);margin-bottom:4px;letter-spacing:.08em;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:12px 13px;border:1px solid var(--bd2);border-radius:var(--r);font-size:14px;color:var(--ink);background:var(--clay-xx);outline:none;transition:border .15s}

function setup(){
  const u=JSON.parse(localStorage.getItem('sk_user')||'{}');
  if(!u.role){window.location.href='return-login.html';return}
  curRole=u.role;
  if(u.role==='client'){
    document.getElementById('tn-role').textContent='客戶';
    document.getElementById('user-av').textContent=(u.name||'客')[0];
    document.getElementById('qadd-btn').style.display='none';

    document.getElementById('tn-role').textContent='管理者';

function forcePage(p,fn){

  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));

  window.scrollTo(0,0);

function buildTabs(role){
  const tabs=role==='admin'?ADMIN_TABS:role==='staff'?STAFF_TABS:CLIENT_TABS;
  document.getElementById('tabbar').innerHTML=tabs.map(t=>`
    <button class="tab" id="tb-${t.id}" onclick="showPage('${t.id}')">
      <svg viewBox="0 0 24 24">${t.svg}</svg>${t.label}
    </button>`).join('');
}

function showPage(p){
  curPage=p;
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('on'));
  document.getElementById('p-'+p)?.classList.add('on');
  document.querySelectorAll('.tab').forEach(e=>e.classList.remove('on'));
  document.getElementById('tb-'+p)?.classList.add('on');
  renderPage(p);
  window.scrollTo(0,0);
}
function renderPage(p){
  const el=document.getElementById('p-'+p);if(!el)return;
  if(p==='dash')renderDash(el);
  else if(p==='booking')renderBooking(el);
  else if(p==='checkout')renderCheckout(el);
  else if(p==='clients')renderClients(el);
  else if(p==='staff')renderStaff(el);
  else if(p==='rev')renderRev(el);
  else if(p==='myleave')renderMyLeave(el);
  else if(p==='myrev')renderMyRev(el);
  else if(p==='client-home')renderClientHome(el);
}

function submitBK(){
  if(!BF.name||!BF.phone){toast('請填寫姓名與電話');return}
  const s=SVCS.find(x=>x.id===BF.svc);
  const sid=BF.staff==='any'?STAFF_LIST[Math.floor(Math.random()*STAFF_LIST.length)].id:BF.staff;
  const b={id:gid(),name:BF.name,phone:BF.phone,service:BF.svc,staffId:sid,date:BF.date,time:BF.time,note:BF.note,status:'confirmed',amount:s.price};
  BK=[...BK,b];sv('sk2_bk',BK);
  addNotif('bk',`${BF.name} 預約了 ${BF.date} ${BF.time} ${s.name}`);
  bDone=b;renderPage('booking');
}

function coPSearch(q){
  const sug=document.getElementById('co-sug');if(!sug)return;
  if(!q){sug.style.display='none';return}
  const matches=CL.filter(c=>c.name.includes(q)||c.phone.includes(q)).slice(0,5);
  if(!matches.length){sug.style.display='none';return}
  sug.style.display='block';
  sug.innerHTML=matches.map(c=>`<div class="psi" onclick="selectCOCl('${c.id}')">
    <div><div class="psi-name">${c.name}</div><div class="psi-phone">${c.phone}</div>
    ${c.pkgT-c.pkgU>0?`<div class="psi-pkg">包卡剩 ${c.pkgT-c.pkgU} 次</div>`:''}</div>
  </div>`).join('');
}
function selectCOCl(id){
  const c=CL.find(x=>x.id===id);if(!c)return;
  CO.client=c.name;CO.items=[];
  document.getElementById('co-sug').style.display='none';
  renderPage('checkout');
}

function completeCO(){
  if(!CO.pay||!CO.items.length||!CO.client)return;
  const cl=CL.find(c=>c.name===CO.client);
  const isSpa=i=>i.id==='spa';
  const total=CO.items.reduce((s,i)=>s+(CO.usePkg&&isSpa(i)?0:i.price),0);
  const pkgDeduct=CO.usePkg?CO.pkgCount:0;
  if(CO.usePkg&&cl){cl.pkgU+=pkgDeduct;sv('sk2_cl',CL);}
  if(CO.bkId){BK=BK.map(b=>b.id===CO.bkId?{...b,done:true}:b);sv('sk2_bk',BK);}
  const isPkg=CO.items.some(i=>i.id==='pkg');
  if(cl){cl.visits+=1;cl.spent+=total;if(isPkg)cl.pkgT+=8;sv('sk2_cl',CL);}
  if(pkgDeduct>0){
    PKGREC=[...PKGREC,{id:gid(),date:today(),client:CO.client,count:pkgDeduct,staffId:CO.staffId||curStaffId,revoked:false}];
    sv('sk2_pkgrec',PKGREC);
    addNotif('pkg',`${CO.client} 包卡扣除 ${pkgDeduct} 次，剩 ${(cl?.pkgT||0)-(cl?.pkgU||0)} 次`);
  }
  const txn={id:gid(),date:today(),client:CO.client,items:CO.items.map(i=>({name:i.name,price:CO.usePkg&&isSpa(i)?0:i.price})),total,pay:CO.pay,staffId:CO.staffId||curStaffId,isPkg,pkgUsed:CO.usePkg,pkgCount:pkgDeduct,invType:CO.invType,invName:CO.invName};
  TXN=[...TXN,txn];sv('sk2_txn',TXN);
  showReceiptModal(txn,cl,pkgDeduct);
  CO={bkId:null,client:'',items:[],pay:'',usePkg:false,pkgCount:1,inv:false,invType:'personal',invName:'',carriers:'',staffId:''};
}

            <div><div class="geno-pname">${c.name}</div><div class="geno-pmeta">${fm(c.spent)} · ${c.visits} 次</div></div>

          <div class="geno-conn" style="text-align:left;margin-left:16px">│</div>

function toggleSched(date,id){

}
function revokePkg(id){
  const r=PKGREC.find(x=>x.id===id);if(!r||r.revoked)return;

function toggleNotif(){

  slot.innerHTML=`<div class="notif-ov" id="notif-ov">
    <div class="notif-bd" onclick="document.getElementById('notif-ov-slot').innerHTML=''"></div>
    <div class="notif-panel" id="notif-p">

        <button style="background:none;border:none;font-size:12px;color:var(--clay);cursor:pointer" onclick="markAllRead()">全部已讀</button>
      </div>
      ${NOTIFS.map(n=>`<div class="notif-item${n.read?'':' unread'}" onclick="readNotif('${n.id}')">
        <div class="notif-icon ${n.type==='bk'?'ni-bk':n.type==='pkg'?'ni-pkg':'ni-warn'}">${n.type==='bk'?'📅':n.type==='pkg'?'🎫':'⚠️'}</div>
        <div style="flex:1"><div class="notif-msg">${n.msg}</div><div class="notif-time">${n.time}</div></div>
        ${!n.read?'<div class="notif-dot"></div>':''}
      </div>`).join('')}
    </div>
  </div>`;
  setTimeout(()=>{
    document.querySelector('.notif-bd')?.classList.add('open');
    document.getElementById('notif-p')?.classList.add('open');
  },10);
}
function readNotif(id){NOTIFS=NOTIFS.map(n=>n.id===id?{...n,read:true}:n);sv('sk2_notifs',NOTIFS);updateNotifBadge();toggleNotif();toggleNotif()}
function markAllRead(){NOTIFS=NOTIFS.map(n=>({...n,read:true}));sv('sk2_notifs',NOTIFS);updateNotifBadge();toggleNotif();toggleNotif()}
function addNotif(type,msg){NOTIFS=[{id:gid(),type,msg,time:'剛剛',read:false},...NOTIFS];sv('sk2_notifs',NOTIFS);updateNotifBadge()}
function updateNotifBadge(){
  const c=NOTIFS.filter(n=>!n.read).length;

function showQuickAdd(){
  document.getElementById('modal-slot').innerHTML=`<div class="modal-ov" onclick="if(event.target.classList.contains('modal-ov'))closeModal()">
    <div class="modal">
      <div class="modal-bar"></div>
      <h3>快速新增預約</h3>
      <div class="cl-field"><label>客人姓名</label><input id="qa-name" placeholder="林小姐"/></div>
      <div class="cl-field"><label>服務</label>
        <select id="qa-svc" style="width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;background:var(--clay-xx);outline:none">
          ${SVCS.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="cl-field"><label>人員</label>
        <select id="qa-staff" style="width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;background:var(--clay-xx);outline:none">
          <option value="any">不指定</option>
          ${STAFF_LIST.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="cl-field"><label>日期</label><input type="date" id="qa-date" value="${today()}" style="width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;background:var(--clay-xx);outline:none"/></div>
        <div class="cl-field"><label>時間</label>
          <select id="qa-time" style="width:100%;padding:10px 12px;border:1px solid var(--bd2);border-radius:var(--r);font-size:13px;background:var(--clay-xx);outline:none">
            ${TIMES.map(t=>`<option value="${t}">${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="mact">
        <button class="mbtn ok" onclick="quickAdd()">新增</button>
        <button class="mbtn cl" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>`;
}
function quickAdd(){
  const name=document.getElementById('qa-name')?.value.trim();
  if(!name){toast('請填寫客人姓名');return}
  const svcId=document.getElementById('qa-svc')?.value;
  const staffId=document.getElementById('qa-staff')?.value;
  const date=document.getElementById('qa-date')?.value;
  const time=document.getElementById('qa-time')?.value;
  const s=SVCS.find(x=>x.id===svcId);
  BK=[...BK,{id:gid(),name,phone:'—',service:svcId,staffId,date,time,note:'',status:'confirmed',amount:s?.price||0}];
  sv('sk2_bk',BK);addNotif('bk',`${name} 預約了 ${date} ${time}`);
  closeModal();renderPage(curPage);toast('預約已新增');
}

/* ══ UTILS ══ */
function cfmBK(id){BK=BK.map(b=>b.id===id?{...b,status:'confirmed'}:b);sv('sk2_bk',BK);closeModal();renderPage(curPage)}
function cnlBK(id){BK=BK.map(b=>b.id===id?{...b,status:'cancelled'}:b);sv('sk2_bk',BK);closeModal();renderPage(curPage)}

function showBkModal(id){
  const b=BK.find(x=>x.id===id);if(!b)return;
  const s=SVCS.find(x=>x.id===b.service);
  const stxt=b.status==='confirmed'?'已確認':b.status==='pending'?'待確認':'已取消';
  document.getElementById('modal-slot').innerHTML=`<div class="modal-ov" onclick="if(event.target.classList.contains('modal-ov'))closeModal()">
    <div class="modal">
      <div class="modal-bar"></div>
      <h3>預約詳細</h3>
      <div class="sumbox">
        <div class="sr"><span class="sl">客人</span><span>${b.name}</span></div>
        ${b.phone!=='—'?`<div class="sr"><span class="sl">電話</span><span>${b.phone}</span></div>`:''}
        <div class="sr"><span class="sl">人員</span><span>${stN(b.staffId)}</span></div>
        <div class="sr"><span class="sl">服務</span><span>${s.name}</span></div>
        <div class="sr"><span class="sl">時間</span><span>${b.date} ${b.time}</span></div>
        <div class="sr"><span class="sl">金額</span><span>${fm(b.amount)}</span></div>
        ${b.note?`<div class="sr"><span class="sl">備註</span><span>${b.note}</span></div>`:''}
        <div class="sr tot"><span class="sl">狀態</span><span>${stxt}</span></div>
      </div>
      <div class="mact">
        ${b.status==='pending'?`<button class="mbtn ok" onclick="cfmBK('${b.id}')">確認</button>`:''}
        ${!b.done?`<button class="mbtn ok" onclick="closeModal();initCO('${b.id}')">結帳</button>`:''}
        ${b.status!=='cancelled'?`<button class="mbtn danger" onclick="cnlBK('${b.id}')">取消</button>`:''}
        <button class="mbtn cl" onclick="closeModal()">關閉</button>
      </div>
    </div>
  </div>`;
}

function showUserMenu(){
  const u=JSON.parse(localStorage.getItem('sk_user')||'{}');
  document.getElementById('modal-slot').innerHTML=`<div class="modal-ov" onclick="if(event.target.classList.contains('modal-ov'))closeModal()">
    <div class="modal">
      <div class="modal-bar"></div>
      <h3>帳號資訊</h3>
      <div style="text-align:center;padding:10px 0 16px">
        <div style="width:52px;height:52px;border-radius:50%;background:var(--clay);display:flex;align-items:center;justify-content:center;font-family:var(--tc);font-size:20px;color:#fff;margin:0 auto 10px">${(u.name||'用')[0]}</div>
        <div style="font-family:var(--tc);font-size:16px;color:var(--ink)">${u.name||'用戶'}</div>
        <div style="font-size:12px;color:var(--clay);margin-top:3px">${u.role==='admin'?'管理者':u.role==='staff'?'店員':'客戶'}</div>
        <div style="font-size:11px;color:var(--ink3);margin-top:2px">回首 Return 感官療癒所</div>
      </div>
      <div class="mact">
        <button class="mbtn cl" onclick="closeModal()">關閉</button>
        <button class="mbtn danger" onclick="logout()">登出</button>
      </div>
    </div>
  </div>`;
}

function logout(){localStorage.removeItem('sk_user');window.location.href='return-login.html'}
function closeModal(){document.getElementById('modal-slot').innerHTML=''}
function toast(msg){
  const old=document.querySelector('.sk-toast');if(old)old.remove();
  const t=document.createElement('div');t.className='sk-toast';
  t.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:500;white-space:nowrap;letter-spacing:.04em;box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none';
  t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',2200);
  setTimeout(()=>t.remove(),2600);
}

setup();
</script>
</body>
